<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <link rel="stylesheet" href="css/options.css">
</head>
<body>
    <header class="options-header">
        <img src="images/icon128.png" alt="" class="options-icon">
        <div>
            <h1 data-i18n="settingsHeading"></h1>
            <p data-i18n="settingsSubtitle"></p>
        </div>
    </header>

    <main class="options-shell">
        <section class="settings-section">
            <div class="section-toolbar">
                <div>
                    <h2 data-i18n="settingsLegacyHeading"></h2>
                    <p data-i18n="settingsLegacyDescription"></p>
                </div>
            </div>

            <form id="legacyForm" class="legacy-form">
                <label class="wide-field">
                    <span data-i18n="options_url_label"></span>
                    <input id="legacyUrl" type="text" autocomplete="off" data-i18n-placeholder="siteUrlPlaceholder">
                </label>
                <label class="checkbox-field">
                    <input id="legacySync" type="checkbox">
                    <span data-i18n="options_chkSync"></span>
                </label>
                <label class="checkbox-field">
                    <input id="legacyShowWelcome" type="checkbox">
                    <span data-i18n="options_chkShowWelcome"></span>
                </label>
                <div class="form-actions">
                    <button id="legacyLoadSync" type="button" class="secondary-button" data-i18n="settingsLegacyLoadSync"></button>
                    <button id="legacyCancel" type="button" class="secondary-button" data-i18n="btnCancel"></button>
                    <button id="legacySave" type="submit" class="primary-button" data-i18n="btnSave"></button>
                </div>
            </form>

            <div class="quick-links-grid">
                <div>
                    <h3 data-i18n="settingsCustomPages"></h3>
                    <div id="legacyCustomPages" class="quick-links"></div>
                </div>
                <div>
                    <h3 data-i18n="options_chromePages"></h3>
                    <div id="legacyChromePages" class="quick-links"></div>
                </div>
                <div>
                    <h3 data-i18n="options_aboutPages"></h3>
                    <div id="legacyAboutPages" class="quick-links"></div>
                </div>
                <div>
                    <h3 data-i18n="options_popularPages"></h3>
                    <div id="legacyPopularPages" class="quick-links"></div>
                </div>
            </div>
        </section>

        <section class="settings-section">
            <div class="section-toolbar">
                <div>
                    <h2 data-i18n="settingsPinnedHeading"></h2>
                    <p data-i18n="settingsPinnedDescription"></p>
                </div>
                <button id="addTile" type="button" class="primary-button" data-i18n="addSite"></button>
            </div>

            <form id="tileForm" class="tile-form" hidden>
                <label>
                    <span data-i18n="siteTitleLabel"></span>
                    <input id="tileTitle" type="text" autocomplete="off">
                </label>
                <label>
                    <span data-i18n="siteUrlLabel"></span>
                    <input id="tileUrl" type="text" autocomplete="off" required data-i18n-placeholder="siteUrlPlaceholder">
                </label>
                <div class="form-actions">
                    <button id="cancelTile" type="button" class="secondary-button" data-i18n="btnCancel"></button>
                    <button id="saveTile" type="submit" class="primary-button" data-i18n="btnSave"></button>
                </div>
            </form>

            <div id="pinnedTiles" class="settings-list"></div>
            <p id="emptyPinned" class="empty-state" hidden data-i18n="settingsNoPinned"></p>
        </section>

        <section class="settings-section">
            <div class="section-toolbar">
                <div>
                    <h2 data-i18n="settingsHiddenHeading"></h2>
                    <p data-i18n="settingsHiddenDescription"></p>
                </div>
                <button id="restoreAllHidden" type="button" class="secondary-button" data-i18n="settingsRestoreAll"></button>
            </div>

            <div id="hiddenTiles" class="settings-list"></div>
            <p id="emptyHidden" class="empty-state" hidden data-i18n="settingsNoHidden"></p>
        </section>

        <section class="settings-section">
            <div class="section-toolbar">
                <div>
                    <h2 data-i18n="settingsPreviewsHeading"></h2>
                    <p data-i18n="settingsPreviewsDescription"></p>
                    <p id="previewCount" class="meta-line"></p>
                </div>
                <button id="clearPreviews" type="button" class="secondary-button" data-i18n="settingsClearPreviews"></button>
            </div>
        </section>
    </main>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <script src="js/options.js"></script>
</body>
</html>
