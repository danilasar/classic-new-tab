<div class="container bookmarks-container">
    <div class="bookmark-toolbar"
         ng-class="{'bookmark-drag-active': bookmarkPanel.toolbar.dragActive}">
        <button class="bookmark-nav-button"
                ng-click="showBookmarkParent($event)"
                ont-dragover="dragOverBookmarkParent($event)"
                ont-drop="dropBookmarkToParent($event)"
                ng-disabled="bookmarkPanel.back.disabled"
                title="{{ bookmarkPanel.back.title }}"
                type="button">
            <i class="fa fa-arrow-left"></i>
        </button>
        <div class="bookmark-breadcrumbs">
            <a href=""
               ng-repeat="pathItem in bookmarkPanel.breadcrumbs track by pathItem.id"
               ng-click="openBookmarkPath(pathItem, $event)"
               ont-dragover="dragOverBookmarkPath(pathItem, $event)"
               ont-drop="dropBookmarkToPath(pathItem, $event)"
               ng-class="{'active': pathItem.id === bookmarkFolderId}">
                {{ pathItem.title }}
            </a>
        </div>
        <div class="bookmark-toolbar-spacer"></div>
        <button class="bookmark-toolbar-button"
                ng-click="openAddBookmark($event)"
                ng-hide="bookmarkPanel.actions.addBookmark.hidden"
                title="{{ bookmarkPanel.actions.addBookmark.title }}"
                type="button">
            <i class="fa fa-bookmark"></i>
            <span>{{ bookmarkPanel.actions.addBookmark.label }}</span>
        </button>
        <button class="bookmark-toolbar-button"
                ng-click="openAddBookmarkFolder($event)"
                title="{{ bookmarkPanel.actions.addFolder.title }}"
                type="button">
            <i class="fa fa-folder"></i>
            <span>{{ bookmarkPanel.actions.addFolder.label }}</span>
        </button>
    </div>

    <div class="bookmarks-page-shell">
        <button class="bookmark-page-side bookmark-page-side-left"
                ng-click="showPreviousBookmarkPage($event)"
                ont-dragover="dragOverBookmarkPage({index: bookmarkPageIndex - 1}, $event)"
                ont-drop="moveDraggedBookmarkToPage({index: bookmarkPageIndex - 1}, $event)"
                ng-disabled="!bookmarkPanel.pagination.hasPrevious"
                ng-show="bookmarkPanel.pagination.show"
                title="{{ bookmarkPanel.pagination.previousTitle }}"
                type="button">
            <i class="fa fa-angle-left"></i>
        </button>

        <div class="bookmarks-grid">
            <div ng-repeat="bookmark in bookmarks track by bookmark.id"
                 class="app-icon bookmark-item"
                 ng-class="{'bookmark-drag-active': draggedBookmarkId,
                            'bookmark-dragging': draggedBookmarkId === bookmark.id,
                            'bookmark-drag-over': dragOverBookmarkIndex === (bookmarkPageIndex * bookmarkPageSize) + $index,
                            'bookmark-folder-drag-over': dragOverBookmarkFolderId === bookmark.id}"
                 draggable="{{ !isBookmarkRootOverview() }}"
                 ont-dragstart="startBookmarkDrag(bookmark, $index, $event)"
                 ont-dragover="dragOverBookmark($index, $event)"
                 ont-dragleave="leaveBookmarkDrag($index, $event)"
                 ont-drop="dropBookmark($index, $event)"
                 ont-dragend="endBookmarkDrag()">
                <a ng-if="bookmark.url"
                   ng-href="{{ bookmark.url }}"
                   title="{{ bookmark.displayTitle }}"
                   target="_self"
                   class="app-icon-container"
                   ng-click="openBookmark($event)">
                    <div class="site-preview">
                        <img class="site-preview-image"
                             ng-if="bookmark.preview"
                             ng-src="{{ bookmark.preview }}"
                             alt="" />
                        <div class="site-preview-fallback">
                            <img class="site-preview-icon"
                                 ng-src="chrome://favicon/{{ bookmark.url }}"
                                 alt="" />
                            <span class="site-preview-title">
                                {{ bookmark.displayTitle }}
                            </span>
                            <span class="site-preview-url">
                                {{ bookmark.displayUrl }}
                            </span>
                        </div>
                    </div>

                    <span class="app-desc">
                        {{ bookmark.displayTitle }}
                    </span>
                </a>
                <button class="bookmark-edit"
                        ng-if="bookmark.url"
                        ng-click="openEditBookmark(bookmark, $event)"
                        title="{{ bookmarkEditTitle }}"
                        type="button">
                    <i class="fa fa-pencil"></i>
                </button>
                <button class="bookmark-delete"
                        ng-if="bookmark.url"
                        ng-click="removeBookmark(bookmark, $event)"
                        title="{{ bookmarkDeleteTitle }}"
                        type="button">
                    <i class="fa fa-times"></i>
                </button>
                <a ng-if="!bookmark.url"
                   href=""
                   ng-click="openBookmarkFolder(bookmark, $event)"
                   title="{{ bookmark.displayTitle }}"
                   class="app-icon-container bookmark-folder"
                   ont-dragover="dragOverBookmarkFolder(bookmark, $event)"
                   ont-dragleave="leaveBookmarkFolderDrag(bookmark, $event)"
                   ont-drop="dropBookmarkIntoFolder(bookmark, $event)">
                    <div class="site-preview bookmark-folder-preview">
                        <div class="site-preview-fallback">
                            <i class="fa fa-folder bookmark-folder-icon"></i>
                            <span class="site-preview-title">
                                {{ bookmark.displayTitle }}
                            </span>
                            <span class="site-preview-url">
                                {{ bookmark.displayUrl }}
                            </span>
                        </div>
                    </div>

                    <span class="app-desc">
                        {{ bookmark.displayTitle }}
                    </span>
                </a>
                <button class="bookmark-edit"
                        ng-if="!bookmark.url"
                        ng-click="openEditBookmark(bookmark, $event)"
                        title="{{ bookmarkEditFolderTitle }}"
                        type="button">
                    <i class="fa fa-pencil"></i>
                </button>
                <button class="bookmark-delete"
                        ng-if="!bookmark.url"
                        ng-click="removeBookmark(bookmark, $event)"
                        title="{{ bookmarkDeleteFolderTitle }}"
                        type="button">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <p class="app-empty-state" ng-if="allBookmarks.length === 0">
                {{ bookmarkEmptyStateLabel }}
            </p>
            <span class="clear"></span>
        </div>

        <button class="bookmark-page-side bookmark-page-side-right"
                ng-click="showNextBookmarkPage($event)"
                ont-dragover="dragOverBookmarkPage({index: bookmarkPageIndex + 1}, $event)"
                ont-drop="moveDraggedBookmarkToPage({index: bookmarkPageIndex + 1}, $event)"
                ng-disabled="!bookmarkPanel.pagination.hasNext"
                ng-show="bookmarkPanel.pagination.show"
                title="{{ bookmarkPanel.pagination.nextTitle }}"
                type="button">
            <i class="fa fa-angle-right"></i>
        </button>
    </div>

    <div class="bookmark-pagination" ng-show="bookmarkPanel.pagination.show">
        <button ng-repeat="page in bookmarkPanel.pagination.pages track by $index"
                ng-click="setBookmarkPage(page, $event)"
                ont-dragover="dragOverBookmarkPage(page, $event)"
                ont-drop="moveDraggedBookmarkToPage(page, $event)"
                ng-class="{'active': page.index === bookmarkPageIndex,
                           'bookmark-page-separator': page.separator}"
                ng-disabled="page.separator"
                type="button">
            {{ page.label }}
        </button>
    </div>
</div>
